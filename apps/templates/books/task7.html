<table border="1">
    <thead>
        <tr>
            <th>City Name</th>
            <th>Total Students</th>
        </tr>
    </thead>
    <tbody>
        {% for city in cities %}
        <tr>
            <td>{{ city.city }}</td> 
            <td>{{ city.num_students }}</td> 
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No data available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
