<!DOCTYPE html>
<html>
<head>
    <title>Delete Book</title>
</head>
<body>
    <h2>Delete Book (Part 2)</h2>
    
    <p>Are you sure you want to delete the book: <strong>{{ book.title }}</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    
    <br>
    <a href="{% url 'listbooks_part2' %}">Cancel</a>
</body>
</html>
