<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete student: <strong>{{ student.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="color: rgb(206, 58, 58);">Confirm Delete</button>
        <a href="{% url 'student2_list' %}">Cancel</a>
    </form>
</body>
</html>
